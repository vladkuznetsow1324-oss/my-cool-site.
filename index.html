<!DOCTYPE html>
<html>
<head>
    <title>Among Us: Survival</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; background: linear-gradient(#0f0c29, #16213e); }
        .ui { 
            position: absolute; top: 15px; left: 15px; 
            color: #00ff00; font-family: 'Courier New', monospace; font-size: 24px;
            text-shadow: 2px 2px 4px #000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ui" id="scoreBoard">HP: 3 | Дистанция: 0 | Монеты: 0</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const playerImg = new Image();
playerImg.src = 'photo1.jpg'; 

let distance = 0;
let coinsCount = 0;
let hp = 3;
let invulnerable = 0; // Время неуязвимости
let cameraX = 0;

const player = {
    x: 50, y: 100, width: 50, height: 50,
    dx: 0, dy: 0, speed: 7, jumpPower: -16, grounded: false
};

let platforms = [{x: 0, y: 500, w: 400, h: 40}];
let coins = [];
let meteors = [];

function generateContent() {
    const lastP = platforms[platforms.length - 1];
    const newX = lastP.x + lastP.w + Math.random() * 150 + 70;
    const newY = Math.max(250, Math.min(canvas.height - 100, lastP.y + (Math.random() * 240 - 120)));
    const newW = Math.random() * 150 + 100;
    
    platforms.push({x: newX, y: newY, w: newW, h: 30});

    if (Math.random() > 0.4) {
        coins.push({x: newX + newW/2, y: newY - 40, collected: false});
    }

    if (Math.random() > 0.6) {
        meteors.push({
            x: player.x + canvas.width + 200,
            y: Math.random() * canvas.height,
            size: 20 + Math.random() * 15,
            speed: 4 + Math.random() * 4
        });
    }
}

function update() {
    if (keys['ArrowLeft']) player.dx = -player.speed;
    else if (keys['ArrowRight']) player.dx = player.speed;
    else player.dx *= 0.8;

    if (keys['ArrowUp'] && player.grounded) {
        player.dy = player.jumpPower;
        player.grounded = false;
    }

    player.dy += 0.8;
    player.x += player.dx;
    player.y += player.dy;
    player.grounded = false;

    // Платформы
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.width > p.x &&
            player.y + player.height > p.y && player.y + player.height < p.y + p.h + 20 && player.dy >= 0) {
            player.y = p.y - player.height;
            player.dy = 0;
            player.grounded = true;
        }
    });

    // Монетки
    coins.forEach(c => {
        if (!c.collected && player.x < c.x + 20 && player.x + player.width > c.x &&
            player.y < c.y + 20 && player.y + player.height > c.y) {
            c.collected = true;
            coinsCount++;
        }
    });

    // Метеориты (Коричневые)
    if (invulnerable > 0) invulnerable--;

    meteors.forEach((m, index) => {
        m.x -= m.speed;
        let dx = (player.x + player.width/2) - m.x;
        let dy = (player.y + player.height/2) - m.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < m.size + 15 && invulnerable <= 0) {
            hp--;
            invulnerable = 60; // Примерно 1 секунда защиты
            meteors.splice(index, 1); // Удаляем метеорит после удара
            if (hp <= 0) resetGame();
        }
    });

    if (player.x > platforms[platforms.length - 1].x - 1000) generateContent();
    if (player.y > canvas.height + 300) resetGame();

    distance = Math.max(distance, Math.floor(player.x));
    document.getElementById('scoreBoard').innerText = `HP: ${hp} | Дистанция: ${distance} | Монеты: ${coinsCount}`;

    cameraX = player.x - canvas.width / 4;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // Рисуем метеориты (Коричневый цвет)
    ctx.fillStyle = '#A0522D';
    meteors.forEach(m => {
        ctx.beginPath(); ctx.arc(m.x, m.y, m.size, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#5D2E17'; ctx.lineWidth = 3; ctx.stroke();
    });

    // Платформы
    ctx.fillStyle = '#444';
    ctx.strokeStyle = '#0ff';
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // Монетки
    ctx.fillStyle = '#ff0';
    coins.forEach(c => {
        if (!c.collected) {
            ctx.beginPath(); ctx.arc(c.x, c.y, 10, 0, Math.PI*2); ctx.fill();
        }
    });

    // Мигание игрока при неуязвимости
    if (invulnerable % 10 < 5) {
        ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
    }

    ctx.restore();
    requestAnimationFrame(update);
}

function resetGame() {
    player.x = 50; player.y = 100; player.dx = 0; player.dy = 0;
    distance = 0; hp = 3; invulnerable = 0;
    platforms = [{x: 0, y: 500, w: 400, h: 40}];
    coins = []; meteors = [];
}

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
playerImg.onload = update;
</script>
</body>
</html>
