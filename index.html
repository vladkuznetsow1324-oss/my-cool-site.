<!DOCTYPE html>
<html>
<head>
    <title>Мой 2D Платформер V2</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #87CEEB; margin: 0 auto; border: 5px solid #fff; }
        .info { color: white; text-align: center; position: absolute; width: 100%; top: 10px; }
    </style>
</head>
<body>
    <div class="info">Стрелки: Движение и Прыжок. Доберись до правой стороны!</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 400;

// Твой персонаж (картинка)
const playerImg = new Image();
playerImg.src = 'photo1.jpg'; 

const player = {
    x: 50, y: 300, width: 40, height: 40,
    dx: 0, dy: 0, speed: 5, jumpPower: -12,
    grounded: false
};

const gravity = 0.6;
const keys = {};
const platforms = [
    {x: 0, y: 380, w: 800, h: 20},  // Пол
    {x: 200, y: 300, w: 150, h: 20}, // Платформа 1
    {x: 450, y: 220, w: 150, h: 20}, // Платформа 2
    {x: 650, y: 320, w: 100, h: 20}  // Платформа 3
];

function update() {
    // Управление
    if (keys['ArrowLeft']) player.dx = -player.speed;
    else if (keys['ArrowRight']) player.dx = player.speed;
    else player.dx = 0;

    if (keys['ArrowUp'] && player.grounded) {
        player.dy = player.jumpPower;
        player.grounded = false;
    }

    // Физика
    player.dy += gravity;
    player.x += player.dx;
    player.y += player.dy;
    player.grounded = false;

    // Столкновения с платформами
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.width > p.x &&
            player.y + player.height > p.y && player.y + player.height < p.y + p.h + 10 && player.dy >= 0) {
            player.y = p.y - player.height;
            player.dy = 0;
            player.grounded = true;
        }
    });

    // Отрисовка
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Рисуем платформы
    ctx.fillStyle = '#8B4513';
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // Рисуем персонажа (твою фотку)
    ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);

    requestAnimationFrame(update);
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

playerImg.onload = update; // Запуск, когда картинка загрузится
</script>
</body>
</html>
