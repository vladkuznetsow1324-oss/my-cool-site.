    <!-- Вместо 'photo1.jpg' напишите названия своих файлов с картинками -->
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    
    <p>Никаких водяных знаков, только чистый стиль.</p>
</body>
</html>
