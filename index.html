<!DOCTYPE html>
<html>
<head>
    <title>Among Us: Infinite Space</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; background: linear-gradient(#0f0c29, #302b63, #24243e); }
        .ui { 
            position: absolute; top: 15px; left: 15px; 
            color: #00ff00; font-family: 'Courier New', monospace; font-size: 28px;
            text-shadow: 2px 2px 4px #000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ui" id="scoreBoard">Дистанция: 0 м</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const playerImg = new Image();
playerImg.src = 'photo1.jpg'; 

let distance = 0;
let cameraX = 0;

const player = {
    x: 50, y: 100, width: 50, height: 50,
    dx: 0, dy: 0, speed: 7, jumpPower: -16, grounded: false
};

const gravity = 0.8;
const keys = {};

// Массив для хранения платформ
let platforms = [
    {x: 0, y: 500, w: 400, h: 40} // Стартовая платформа
];

// Функция генерации новой платформы
function generatePlatform() {
    const lastP = platforms[platforms.length - 1];
    const newX = lastP.x + lastP.w + Math.random() * 150 + 50; // Случайное расстояние
    const newY = Math.max(200, Math.min(canvas.height - 100, lastP.y + (Math.random() * 200 - 100)));
    const newW = Math.random() * 150 + 100; // Случайная ширина
    platforms.push({x: newX, y: newY, w: newW, h: 30});
}

function update() {
    // Управление
    if (keys['ArrowLeft']) player.dx = -player.speed;
    else if (keys['ArrowRight']) player.dx = player.speed;
    else player.dx *= 0.8;

    if (keys['ArrowUp'] && player.grounded) {
        player.dy = player.jumpPower;
        player.grounded = false;
    }

    player.dy += gravity;
    player.x += player.dx;
    player.y += player.dy;
    player.grounded = false;

    // Столкновения и генерация
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.width > p.x &&
            player.y + player.height > p.y && player.y + player.height < p.y + p.h + 20 && player.dy >= 0) {
            player.y = p.y - player.height;
            player.dy = 0;
            player.grounded = true;
        }
    });

    // Если игрок приближается к последней платформе — создаем новую
    if (player.x > platforms[platforms.length - 1].x - 1000) {
        generatePlatform();
    }

    // Удаляем старые платформы (оптимизация)
    if (platforms.length > 20) {
        platforms.shift();
    }

    // Считаем дистанцию
    if (player.x > distance) {
        distance = Math.floor(player.x);
        document.getElementById('scoreBoard').innerText = `Дистанция: ${distance} м`;
    }

    // Рестарт при падении
    if (player.y > canvas.height + 200) {
        player.x = 50; player.y = 100; player.dx = 0; player.dy = 0;
        distance = 0;
        platforms = [{x: 0, y: 500, w: 400, h: 40}];
    }

    cameraX = player.x - canvas.width / 4;
    if (cameraX < 0) cameraX = 0;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // Рисуем платформы в стиле "космических обломков"
    ctx.fillStyle = '#444';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#0ff';
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
    ctx.shadowBlur = 0;

    // Рисуем Амонгуса
    ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);

    ctx.restore();
    requestAnimationFrame(update);
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
playerImg.onload = update;
</script>
</body>
</html>
