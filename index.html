<!DOCTYPE html>
<html>
<head>
    <title>Among Us: Meteor Survival</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; background: linear-gradient(#0f0c29, #16213e); }
        .ui { 
            position: absolute; top: 15px; left: 15px; 
            color: #00ff00; font-family: 'Courier New', monospace; font-size: 24px;
            text-shadow: 2px 2px 4px #000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ui" id="scoreBoard">Дистанция: 0 | Рекорд: 0 | Монеты: 0</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const playerImg = new Image();
playerImg.src = 'photo1.jpg'; 

let distance = 0;
let coinsCount = 0;
let highScore = localStorage.getItem('highScore') || 0;
let cameraX = 0;

const player = {
    x: 50, y: 100, width: 50, height: 50,
    dx: 0, dy: 0, speed: 7, jumpPower: -16, grounded: false
};

let platforms = [{x: 0, y: 500, w: 400, h: 40}];
let coins = [];
let meteors = [];

function generateContent() {
    const lastP = platforms[platforms.length - 1];
    const newX = lastP.x + lastP.w + Math.random() * 150 + 50;
    const newY = Math.max(200, Math.min(canvas.height - 100, lastP.y + (Math.random() * 200 - 100)));
    const newW = Math.random() * 150 + 100;
    
    platforms.push({x: newX, y: newY, w: newW, h: 30});

    // С шансом 50% создаем монетку
    if (Math.random() > 0.5) {
        coins.push({x: newX + newW/2, y: newY - 40, collected: false});
    }

    // Создаем метеорит
    meteors.push({
        x: player.x + canvas.width + Math.random() * 500,
        y: Math.random() * canvas.height,
        size: 15 + Math.random() * 20,
        speed: 5 + Math.random() * 5
    });
}

function update() {
    if (keys['ArrowLeft']) player.dx = -player.speed;
    else if (keys['ArrowRight']) player.dx = player.speed;
    else player.dx *= 0.8;

    if (keys['ArrowUp'] && player.grounded) {
        player.dy = player.jumpPower;
        player.grounded = false;
    }

    player.dy += 0.8;
    player.x += player.dx;
    player.y += player.dy;
    player.grounded = false;

    // Платформы
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.width > p.x &&
            player.y + player.height > p.y && player.y + player.height < p.y + p.h + 20 && player.dy >= 0) {
            player.y = p.y - player.height;
            player.dy = 0;
            player.grounded = true;
        }
    });

    // Монетки
    coins.forEach(c => {
        if (!c.collected && player.x < c.x + 20 && player.x + player.width > c.x &&
            player.y < c.y + 20 && player.y + player.height > c.y) {
            c.collected = true;
            coinsCount++;
            distance += 100; // Бонус за монетку
        }
    });

    // Метеориты (полет и столкновение)
    meteors.forEach(m => {
        m.x -= m.speed;
        let dx = (player.x + player.width/2) - m.x;
        let dy = (player.y + player.height/2) - m.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < m.size + 20) resetGame();
    });

    if (player.x > platforms[platforms.length - 1].x - 1000) generateContent();
    if (player.y > canvas.height + 200) resetGame();

    distance = Math.max(distance, Math.floor(player.x));
    if (distance > highScore) {
        highScore = distance;
        localStorage.setItem('highScore', highScore);
    }

    document.getElementById('scoreBoard').innerText = `Дистанция: ${distance} | Рекорд: ${highScore} | Монеты: ${coinsCount}`;

    cameraX = player.x - canvas.width / 4;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // Рисуем метеориты
    ctx.fillStyle = '#ff4500';
    meteors.forEach(m => {
        ctx.beginPath(); ctx.arc(m.x, m.y, m.size, 0, Math.PI*2); ctx.fill();
    });

    // Платформы
    ctx.fillStyle = '#444';
    ctx.strokeStyle = '#0ff';
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // Монетки
    ctx.fillStyle = '#ff0';
    coins.forEach(c => {
        if (!c.collected) {
            ctx.beginPath(); ctx.arc(c.x, c.y, 10, 0, Math.PI*2); ctx.fill();
        }
    });

    ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
    ctx.restore();
    requestAnimationFrame(update);
}

function resetGame() {
    player.x = 50; player.y = 100; player.dx = 0; player.dy = 0;
    distance = 0; coinsCount = 0;
    platforms = [{x: 0, y: 500, w: 400, h: 40}];
    coins = []; meteors = [];
}

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
playerImg.onload = update;
</script>
</body>
</html>
