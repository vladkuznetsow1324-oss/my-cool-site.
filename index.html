<!DOCTYPE html>
<html>
<head>
    <title>Among Us: Mission Complete</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; background: linear-gradient(#1a1a2e, #16213e); }
        .ui { 
            position: absolute; top: 15px; left: 15px; 
            color: #00ff00; font-family: 'Courier New', monospace; font-size: 28px;
            text-shadow: 2px 2px 0px #000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ui" id="scoreBoard">Собрано данных: 0</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const playerImg = new Image();
playerImg.src = 'photo1.jpg'; 

let score = 0;
let cameraX = 0;
let win = false;

const player = {
    x: 50, y: 100, width: 50, height: 50,
    dx: 0, dy: 0, speed: 7, jumpPower: -16, grounded: false
};

const portal = { x: 2600, y: 0, w: 80, h: 120 }; // Координаты финиша
const gravity = 0.8;
const keys = {};

const platforms = [
    {x: 0, y: canvas.height - 40, w: 1000, h: 40},
    {x: 300, y: canvas.height - 180, w: 150, h: 20},
    {x: 600, y: canvas.height - 300, w: 150, h: 20},
    {x: 1100, y: canvas.height - 200, w: 400, h: 40}, // Остров
    {x: 1600, y: canvas.height - 350, w: 150, h: 20},
    {x: 1900, y: canvas.height - 250, w: 150, h: 20},
    {x: 2200, y: canvas.height - 400, w: 150, h: 20},
    {x: 2500, y: canvas.height - 150, w: 500, h: 150} // Финишная площадка
];

let coins = [
    {x: 350, y: canvas.height - 230, collected: false},
    {x: 650, y: canvas.height - 350, collected: false},
    {x: 1200, y: canvas.height - 250, collected: false},
    {x: 1650, y: canvas.height - 400, collected: false},
    {x: 2250, y: canvas.height - 450, collected: false}
];

function update() {
    if (win) return;

    if (keys['ArrowLeft']) player.dx = -player.speed;
    else if (keys['ArrowRight']) player.dx = player.speed;
    else player.dx *= 0.8;

    if (keys['ArrowUp'] && player.grounded) {
        player.dy = player.jumpPower;
        player.grounded = false;
    }

    player.dy += gravity;
    player.x += player.dx;
    player.y += player.dy;
    player.grounded = false;

    // Столкновения с платформами
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.width > p.x &&
            player.y + player.height > p.y && player.y + player.height < p.y + p.h + 20 && player.dy >= 0) {
            player.y = p.y - player.height;
            player.dy = 0;
            player.grounded = true;
        }
    });

    // Сбор монет
    coins.forEach(c => {
        if (!c.collected && player.x < c.x + 20 && player.x + player.width > c.x &&
            player.y < c.y + 20 && player.y + player.height > c.y) {
            c.collected = true;
            score++;
            document.getElementById('scoreBoard').innerText = "Собрано данных: " + score;
        }
    });

    // Проверка финиша
    portal.y = canvas.height - 270;
    if (player.x + player.width > portal.x && player.x < portal.x + portal.w &&
        player.y + player.height > portal.y) {
        win = true;
        alert("МИССИЯ ВЫПОЛНЕНА! Ты собрал " + score + " монет.");
        location.reload(); // Перезапуск
    }

    cameraX = player.x - canvas.width / 4;
    if (cameraX < 0) cameraX = 0;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // Платформы
    ctx.fillStyle = '#333';
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // Монетки
    ctx.fillStyle = '#00ff00';
    coins.forEach(c => {
        if (!c.collected) {
            ctx.beginPath();
            ctx.arc(c.x, c.y, 8, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // Портал
    ctx.fillStyle = '#f0f';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#f0f';
    ctx.fillRect(portal.x, portal.y, portal.w, portal.h);
    ctx.shadowBlur = 0;

    // Игрок
    ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);

    ctx.restore();
    requestAnimationFrame(update);
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
playerImg.onload = update;
</script>
</body>
</html>
